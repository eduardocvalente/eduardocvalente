<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    .ok     { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .cert   { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    .lvl    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #22D3EE; font-weight: bold; }
    .lvlmax { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #F59E0B; font-weight: bold; }
    .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #475569; }
    .deg    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #A78BFA; font-weight: bold; }
    .inst   { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #94A3B8; }
    .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .cmd    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; }
  </style>
</defs>

<rect width="880" height="420" rx="18" fill="url(#bgGlow)"/>
<rect width="880" height="420" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="874" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="5" fill="#10B981"/>
  <text x="440" y="25" text-anchor="middle" class="term-label">eduardo@valente ~ % certs --verify &amp;&amp; degrees --list</text>
  <text x="777" y="24" class="panel-title">CREDENTIALS</text>
</g>

<g>
  <text x="28" y="68"><tspan class="prompt">$ </tspan><tspan class="cmd">certs --verify hackerrank</tspan></text>
</g>
<g>
  <text x="28" y="94"><tspan class="ok">&#10004; </tspan><tspan class="cert">SQL</tspan><tspan class="cc"> ........................... </tspan><tspan class="lvlmax">ADVANCED &#9733;</tspan></text>
</g>
<g>
  <text x="28" y="118"><tspan class="ok">&#10004; </tspan><tspan class="cert">Node.js</tspan><tspan class="cc"> ....................... </tspan><tspan class="lvl">Intermediate</tspan></text>
</g>
<g>
  <text x="28" y="142"><tspan class="ok">&#10004; </tspan><tspan class="cert">JavaScript</tspan><tspan class="cc"> .................... </tspan><tspan class="lvl">Intermediate</tspan></text>
</g>
<g>
  <text x="28" y="166"><tspan class="ok">&#10004; </tspan><tspan class="cert">REST API</tspan><tspan class="cc"> ...................... </tspan><tspan class="lvl">Intermediate</tspan></text>
</g>
<g>
  <text x="28" y="190"><tspan class="ok">&#10004; </tspan><tspan class="cert">Problem Solving</tspan><tspan class="cc"> ............... </tspan><tspan class="lvl">Intermediate</tspan></text>
</g>
<g>
  <text x="28" y="214"><tspan class="ok">&#10004; </tspan><tspan class="cert">Software Engineer Intern</tspan><tspan class="cc"> ...... </tspan><tspan class="lvl">Certified</tspan></text>
</g>

<g>
  <text x="28" y="252"><tspan class="prompt">$ </tspan><tspan class="cmd">degrees --list</tspan></text>
</g>
<g>
  <text x="28" y="278"><tspan class="deg">&#9670; Engenharia de Software</tspan><tspan class="cc"> &#8212; </tspan><tspan class="inst">IFG &#183; conclu&#237;do &#183; TCC nota m&#225;xima</tspan></text>
</g>
<g>
  <text x="28" y="302"><tspan class="deg">&#9670; Ci&#234;ncias Cont&#225;beis</tspan><tspan class="cc"> &#8212; </tspan><tspan class="inst">UEG &#183; conclu&#237;do</tspan></text>
</g>
<g>
  <text x="28" y="326"><tspan class="deg">&#9670; MBA Auditoria Digital &amp; Direito Tribut&#225;rio</tspan><tspan class="cc"> &#8212; </tspan><tspan class="inst">BSSP &#183; conclu&#237;do</tspan></text>
</g>
<g>
  <text x="28" y="350"><tspan class="deg">&#9670; Ingl&#234;s intermedi&#225;rio-avan&#231;ado</tspan><tspan class="cc"> &#8212; </tspan><tspan class="inst">Centro de L&#237;nguas UFG &#183; 6&#186; per&#237;odo</tspan></text>
</g>

<g>
  <text x="28" y="392"><tspan class="prompt">$ </tspan></text>
</g>
<rect x="46" y="380" width="8" height="14" fill="#22D3EE" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="2.4s" repeatCount="indefinite"/>
</rect>

<rect x="3" y="3" width="874" height="414" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
</svg>
