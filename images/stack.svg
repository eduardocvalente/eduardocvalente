<svg xmlns="http://www.w3.org/2000/svg" width="880" height="342" viewBox="0 0 880 342">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    .key    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #22D3EE; font-weight: bold; }
    .value  { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #475569; }
    .arrow  { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #7C3AED; font-weight: bold; }
    .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; }
  </style>
</defs>

<rect width="880" height="342" rx="18" fill="url(#bgGlow)"/>
<rect width="880" height="342" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="874" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="5" fill="#10B981"/>
  <text x="440" y="25" text-anchor="middle" class="term-label">eduardo@valente ~ % stack --list --verbose</text>
  <text x="785" y="24" class="panel-title">TECH.STACK</text>
</g>

<g>
  <text x="28" y="68"><tspan class="prompt">$ </tspan><tspan class="value">stack --list --verbose</tspan></text>
</g>
<g>
  <text x="28" y="96"><tspan class="arrow">&#9656; </tspan><tspan class="key">backend</tspan><tspan class="cc"> ........ </tspan><tspan class="value">C# &#183; .NET 6/7/8/10 &#183; ASP.NET Core &#183; EF Core &#183; Node.js &#183; Express</tspan></text>
</g>
<g>
  <text x="28" y="122"><tspan class="arrow">&#9656; </tspan><tspan class="key">frontend</tspan><tspan class="cc"> ....... </tspan><tspan class="value">React &#183; TypeScript &#183; Razor &#183; Tailwind &#183; Sass/SCSS &#183; jQuery</tspan></text>
</g>
<g>
  <text x="28" y="148"><tspan class="arrow">&#9656; </tspan><tspan class="key">databases</tspan><tspan class="cc"> ...... </tspan><tspan class="value">PostgreSQL &#183; SQL Server &#183; MySQL &#183; MongoDB &#183; Redis</tspan></text>
</g>
<g>
  <text x="28" y="174"><tspan class="arrow">&#9656; </tspan><tspan class="key">aws</tspan><tspan class="cc"> ............ </tspan><tspan class="value">EC2 &#183; RDS &#183; S3 &#183; CloudFront &#183; IAM</tspan><tspan class="cc">  (portf&#243;lio em produ&#231;&#227;o)</tspan></text>
</g>
<g>
  <text x="28" y="200"><tspan class="arrow">&#9656; </tspan><tspan class="key">azure</tspan><tspan class="cc"> .......... </tspan><tspan class="value">Functions &#183; Service Bus &#183; Application Insights</tspan></text>
</g>
<g>
  <text x="28" y="226"><tspan class="arrow">&#9656; </tspan><tspan class="key">devops</tspan><tspan class="cc"> ......... </tspan><tspan class="value">Docker &#183; GitHub Actions &#183; CI/CD &#183; Linux &#183; Git/GitFlow</tspan></text>
</g>
<g>
  <text x="28" y="252"><tspan class="arrow">&#9656; </tspan><tspan class="key">architecture</tspan><tspan class="cc"> ... </tspan><tspan class="value">Clean &#183; Hexagonal &#183; Onion &#183; DDD &#183; CQRS &#183; Event-Driven &#183; SOLID</tspan></text>
</g>
<g>
  <text x="28" y="278"><tspan class="arrow">&#9656; </tspan><tspan class="key">quality</tspan><tspan class="cc"> ........ </tspan><tspan class="value">xUnit &#183; Moq &#183; FluentAssertions &#183; Swagger &#183; Postman</tspan></text>
</g>
<g>
  <text x="28" y="308"><tspan class="prompt">$ </tspan></text>
</g>
<rect x="46" y="296" width="8" height="14" fill="#22D3EE" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="1.8s" repeatCount="indefinite"/>
</rect>

<rect x="3" y="3" width="874" height="336" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
</svg>
