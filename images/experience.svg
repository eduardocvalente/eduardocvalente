<svg xmlns="http://www.w3.org/2000/svg" width="880" height="404" viewBox="0 0 880 404">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    .co     { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #22D3EE; font-weight: bold; }
    .role   { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #A78BFA; font-weight: bold; }
    .period { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #64748B; }
    .desc   { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #94A3B8; }
    .hl     { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #E5E7EB; }
    .dot    { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #10B981; font-weight: bold; }
    .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .cmd    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; }
  </style>
</defs>

<rect width="880" height="404" rx="18" fill="url(#bgGlow)"/>
<rect width="880" height="404" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="874" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="5" fill="#10B981"/>
  <text x="440" y="25" text-anchor="middle" class="term-label">eduardo@valente ~ % git log --career --oneline</text>
  <text x="790" y="24" class="panel-title">CAREER.LOG</text>
</g>

<g>
  <text x="28" y="68"><tspan class="prompt">$ </tspan><tspan class="cmd">git log --career --oneline</tspan></text>
</g>

<g>
  <text x="28" y="102"><tspan class="dot">&#9679; </tspan><tspan class="co">ClickMenos Solu&#231;&#245;es</tspan><tspan class="period">  set/2025 &#8594; mai/2026</tspan><tspan class="role">  Full-stack</tspan></text>
  <text x="46" y="122" class="desc">.NET 6+ &#183; SQL Server/PostgreSQL &#183; Azure Service Bus &#183; Razor/Sass</text>
  <text x="46" y="140" class="hl">&#8627; eliminei N+1 no EF Core &#183; async resiliente &#183; Azure Functions + App Insights</text>
</g>

<g>
  <text x="28" y="174"><tspan class="dot">&#9679; </tspan><tspan class="co">Locavibe Loca&#231;&#245;es</tspan><tspan class="period">    mar/2025 &#8594; jul/2025</tspan><tspan class="role">  Full-stack</tspan></text>
  <text x="46" y="194" class="desc">Node.js &#183; Express &#183; TypeScript &#183; React &#183; MongoDB</text>
  <text x="46" y="212" class="hl">&#8627; cadeia de middlewares &#183; integra&#231;&#227;o de APIs de terceiros &#183; consultas otimizadas</text>
</g>

<g>
  <text x="28" y="246"><tspan class="dot">&#9679; </tspan><tspan class="co">DNL Com&#233;rcio</tspan><tspan class="period">         out/2024 &#8594; fev/2025</tspan><tspan class="role">  Backend</tspan></text>
  <text x="46" y="266" class="desc">Gateway de pagamento &#183; .NET &#183; PostgreSQL &#183; Redis &#183; eventos ass&#237;ncronos</text>
  <text x="46" y="284" class="hl">&#8627; APIs de transa&#231;&#227;o &#183; cache Redis &#183; testes com xUnit/Moq em m&#243;dulos cr&#237;ticos</text>
</g>

<g>
  <text x="28" y="318"><tspan class="dot">&#9679; </tspan><tspan class="co">Inforsystem</tspan><tspan class="period">          out/2023 &#8594; set/2024</tspan><tspan class="role">  Full-stack</tspan></text>
  <text x="46" y="338" class="desc">ERP em .NET/C# &#183; Firebird &#183; arquitetura MVC</text>
  <text x="46" y="356" class="hl">&#8627; Design Patterns + SOLID &#183; otimiza&#231;&#227;o de SQL &#183; Git/GitFlow</text>
</g>

<g>
  <text x="28" y="386"><tspan class="prompt">$ </tspan></text>
</g>
<rect x="46" y="374" width="8" height="14" fill="#22D3EE" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="1.7s" repeatCount="indefinite"/>
</rect>

<rect x="3" y="3" width="874" height="398" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
</svg>
