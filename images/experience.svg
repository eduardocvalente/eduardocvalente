<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    .key    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #22D3EE; font-weight: bold; }
    .value  { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #475569; }
    .arrow  { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #7C3AED; font-weight: bold; }
    .hero   { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #F59E0B; font-weight: bold; }
    .dot    { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #10B981; font-weight: bold; }
    .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .cmd    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; }
  </style>
</defs>

<rect width="880" height="372" rx="18" fill="url(#bgGlow)"/>
<rect width="880" height="372" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="874" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="5" fill="#10B981"/>
  <text x="440" y="25" text-anchor="middle" class="term-label">eduardo@valente ~ % cat ~/experience/highlights.log</text>
  <text x="800" y="24" class="panel-title">BATTLE.LOG</text>
</g>

<g>
  <text x="28" y="68"><tspan class="prompt">$ </tspan><tspan class="cmd">cat ~/experience/highlights.log</tspan></text>
</g>

<g>
  <text x="28" y="100"><tspan class="dot">&#9679; </tspan><tspan class="hero">+2 anos construindo sistemas em produ&#231;&#227;o</tspan><tspan class="value"> &#8212; full-stack .NET &#183; Node.js &#183; React</tspan></text>
</g>

<g>
  <text x="28" y="134"><tspan class="arrow">&#9656; </tspan><tspan class="key">performance</tspan><tspan class="cc"> .... </tspan><tspan class="value">elimina&#231;&#227;o de N+1 &#183; compiled queries &#183; cache Redis &#183; baixa lat&#234;ncia</tspan></text>
</g>
<g>
  <text x="28" y="162"><tspan class="arrow">&#9656; </tspan><tspan class="key">event-driven</tspan><tspan class="cc"> ... </tspan><tspan class="value">RabbitMQ &#183; Azure Service Bus &#183; consumo ass&#237;ncrono resiliente</tspan></text>
</g>
<g>
  <text x="28" y="190"><tspan class="arrow">&#9656; </tspan><tspan class="key">dom&#237;nios</tspan><tspan class="cc"> ....... </tspan><tspan class="value">sistemas financeiros &#183; gateway de pagamento &#183; ERP &#183; plataformas web</tspan></text>
</g>
<g>
  <text x="28" y="218"><tspan class="arrow">&#9656; </tspan><tspan class="key">resili&#234;ncia</tspan><tspan class="cc"> .... </tspan><tspan class="value">async/await &#183; cancelamento cooperativo &#183; TPL &#183; controle de timeout</tspan></text>
</g>
<g>
  <text x="28" y="246"><tspan class="arrow">&#9656; </tspan><tspan class="key">serverless</tspan><tspan class="cc"> ..... </tspan><tspan class="value">Azure Functions &#183; observabilidade com Application Insights</tspan></text>
</g>
<g>
  <text x="28" y="274"><tspan class="arrow">&#9656; </tspan><tspan class="key">frontend</tspan><tspan class="cc"> ....... </tspan><tspan class="value">UI responsiva &#183; event delegation &#183; DOM avan&#231;ado &#183; Chrome DevTools</tspan></text>
</g>
<g>
  <text x="28" y="302"><tspan class="arrow">&#9656; </tspan><tspan class="key">qualidade</tspan><tspan class="cc"> ...... </tspan><tspan class="value">xUnit/Moq em m&#243;dulos cr&#237;ticos &#183; code review &#183; Git/GitFlow</tspan></text>
</g>

<g>
  <text x="28" y="338"><tspan class="prompt">$ </tspan></text>
</g>
<rect x="46" y="326" width="8" height="14" fill="#22D3EE" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="1.8s" repeatCount="indefinite"/>
</rect>

<rect x="3" y="3" width="874" height="366" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
</svg>
