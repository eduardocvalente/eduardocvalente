<svg xmlns="http://www.w3.org/2000/svg" width="880" height="484" viewBox="0 0 880 484">
<defs>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#7DD3FC" opacity="0.05"/>
  </pattern>
  <style>
    .ptitle { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #22D3EE; font-weight: bold; }
    .ptag   { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #A78BFA; font-weight: bold; }
    .pdesc  { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #94A3B8; }
    .star   { font-family: 'Courier New', Consolas, monospace; font-size: 13px; fill: #F59E0B; font-weight: bold; }
    .arrow  { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #7C3AED; font-weight: bold; }
    .prompt { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
    .cmd    { font-family: 'Courier New', Consolas, monospace; font-size: 14px; fill: #E5E7EB; }
    text, tspan { white-space: pre; }
    .term-label { font-family: 'Courier New', Consolas, monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
    .panel-title { font-family: 'Courier New', Consolas, monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.7; }
  </style>
</defs>

<rect width="880" height="484" rx="18" fill="url(#bgGlow)"/>
<rect width="880" height="484" rx="18" fill="url(#scanlines)"/>

<g id="titlebar">
  <rect x="3" y="3" width="874" height="34" rx="16" fill="#0B1120" fill-opacity="0.85"/>
  <circle cx="24" cy="20" r="5" fill="#EF4444"/>
  <circle cx="42" cy="20" r="5" fill="#F59E0B"/>
  <circle cx="60" cy="20" r="5" fill="#10B981"/>
  <text x="440" y="25" text-anchor="middle" class="term-label">eduardo@valente ~ % ls ~/deployments --sort=impact</text>
  <text x="777" y="24" class="panel-title">DEPLOYMENTS</text>
</g>

<g>
  <text x="28" y="68"><tspan class="prompt">$ </tspan><tspan class="cmd">ls ~/deployments --sort=impact</tspan></text>
</g>

<g>
  <text x="28" y="100"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">benchmark C# &#215; Java &#215; Node.js</tspan><tspan class="star">  [ TCC &#8212; nota m&#225;xima &#9733; ]</tspan></text>
  <text x="46" y="120" class="pdesc">3 bibliotecas open-source publicadas &#183; dashboard interativo &#183; 3.675 registros validados</text>
</g>

<g>
  <text x="28" y="154"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">portf&#243;lio em produ&#231;&#227;o na AWS</tspan><tspan class="ptag">  [ EC2 &#183; RDS &#183; S3 &#183; CloudFront ]</tspan></text>
  <text x="46" y="174" class="pdesc">eduardovalente.dev &#183; IAM &#183; credenciais via vari&#225;veis de ambiente no systemd</text>
</g>

<g>
  <text x="28" y="208"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">notificacoes-core-service</tspan><tspan class="ptag">  [ .NET &#183; Arquitetura Hexagonal ]</tspan></text>
  <text x="46" y="228" class="pdesc">RabbitMQ com 3 consumers em paralelo &#183; MailKit + Razor Templates &#183; PostgreSQL 16 &#183; Serilog</text>
</g>

<g>
  <text x="28" y="262"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">gestao-matriculas-service</tspan><tspan class="ptag">  [ .NET &#183; Clean Architecture ]</tspan></text>
  <text x="46" y="282" class="pdesc">DDD + CQRS (MediatR) &#183; FluentValidation &#183; eventos de dom&#237;nio &#183; partial index &#183; EF Core 9</text>
</g>

<g>
  <text x="28" y="316"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">PrintManagerAPI</tspan><tspan class="ptag">  [ .NET 8 &#183; Minimal APIs ]</tspan></text>
  <text x="46" y="336" class="pdesc">fila FIFO com controle de concorr&#234;ncia &#183; Repository/Service Pattern &#183; health check</text>
</g>

<g>
  <text x="28" y="370"><tspan class="arrow">&#9656; </tspan><tspan class="ptitle">FastCep.Api</tspan><tspan class="ptag">  [ C# &#183; Redis ]</tspan></text>
  <text x="46" y="390" class="pdesc">consulta de CEP de alta performance &#183; cache inteligente &#183; fallback entre provedores</text>
</g>

<g>
  <text x="28" y="424"><tspan class="cc" fill="#475569">&#8594; reposit&#243;rios p&#250;blicos linkados abaixo do painel</tspan></text>
</g>

<g>
  <text x="28" y="452"><tspan class="prompt">$ </tspan></text>
</g>
<rect x="46" y="440" width="8" height="14" fill="#22D3EE" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="2.0s" repeatCount="indefinite"/>
</rect>

<rect x="3" y="3" width="874" height="478" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
  <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite"/>
</rect>
</svg>
